version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["NONE"]

  bot:
    build: .
    container_name: smart-bot
    restart: always
    volumes:
      - ./sessions:/app/sessions
      - ./knowledge_base.md:/app/knowledge_base.md
      - ./terminals:/app/terminals # Для логов, если нужно
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    command: python3 -u main.py

  chainlit:
    build: .
    container_name: chainlit-bot
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./sessions:/app/sessions
      - ./knowledge_base.md:/app/knowledge_base.md
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    command: python3 -u -m chainlit run chainlit_app.py --host 0.0.0.0 --port 8000

