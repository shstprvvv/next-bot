version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build: .
    container_name: smart-bot
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions
      - ./knowledge_base.md:/app/knowledge_base.md
      - ./terminals:/app/terminals # Для логов, если нужно
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    command: python3 main.py

